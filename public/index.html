<div id="login-screen">
    
    <div class="login-box" id="box-login">
        <h2>Meu Organizador</h2>
        <input type="email" id="emailInput" placeholder="E-mail">
        <input type="password" id="passInput" placeholder="Senha">
        <div class="login-buttons">
            <button onclick="handleLogin()">Entrar</button>
            <button class="btn-secondary" onclick="handleRegister()">Cadastrar</button>
        </div>
        <p id="login-msg"></p>
        <button style="background:none; border:none; color:#63b3ed; font-size:12px; margin-top:15px; cursor:pointer;" onclick="showForgotBox()">Esqueci minha senha</button>
    </div>

    <div class="login-box" id="box-forgot" style="display: none;">
        <h2>Recuperar Senha</h2>
        <p style="font-size:12px; margin-bottom:15px; color:#aaa;">Digite seu e-mail para receber o link.</p>
        <input type="email" id="forgotEmailInput" placeholder="Seu E-mail de cadastro">
        <div class="login-buttons">
            <button onclick="handleForgotPassword()">Enviar Link</button>
            <button class="btn-secondary" onclick="showLoginBox()">Voltar</button>
        </div>
        <p id="forgot-msg" style="font-size:12px; margin-top:15px;"></p>
    </div>

    <div class="login-box" id="box-reset" style="display: none;">
        <h2>Criar Nova Senha</h2>
        <input type="password" id="newPassInput" placeholder="Digite a nova senha">
        <button style="width:100%; margin-top:10px;" onclick="handleResetPassword()">Salvar Nova Senha</button>
        <p id="reset-msg" style="font-size:12px; margin-top:15px;"></p>
    </div>

</div>
