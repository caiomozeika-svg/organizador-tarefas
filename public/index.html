<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Organizador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="login-screen">
        <div class="login-box" id="box-login">
            <h2>Meu Organizador</h2>
            <input type="email" id="emailInput" placeholder="E-mail">
            <input type="password" id="passInput" placeholder="Senha">
            <div class="login-buttons">
                <button onclick="handleLogin()">Entrar</button>
                <button class="btn-secondary" onclick="handleRegister()">Cadastrar</button>
            </div>
            <p id="login-msg"></p>
            <button style="background:none; border:none; color:#63b3ed; font-size:12px; margin-top:15px; cursor:pointer;" onclick="showForgotBox()">Esqueci minha senha</button>
        </div>

        <div class="login-box" id="box-forgot" style="display: none;">
            <h2>Recuperar Senha</h2>
            <p style="font-size:12px; margin-bottom:15px; color:#aaa;">Digite seu e-mail para receber o link.</p>
            <input type="email" id="forgotEmailInput" placeholder="Seu E-mail de cadastro">
            <div class="login-buttons">
                <button onclick="handleForgotPassword()">Enviar Link</button>
                <button class="btn-secondary" onclick="showLoginBox()">Voltar</button>
            </div>
            <p id="forgot-msg" style="font-size:12px; margin-top:15px;"></p>
        </div>

        <div class="login-box" id="box-reset" style="display: none;">
            <h2>Criar Nova Senha</h2>
            <input type="password" id="newPassInput" placeholder="Digite a nova senha">
            <button style="width:100%; margin-top:10px;" onclick="handleResetPassword()">Salvar Nova Senha</button>
            <p id="reset-msg" style="font-size:12px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div class="container">
            <div class="header-user">
                <button class="btn-logout" onclick="handleLogout()">Sair 🚪</button>
            </div>
            <h1>Planejamento do Dia</h1>
            
            <div class="toolbar">
                <button class="btn-export" onclick="exportToExcel()">📊 Exportar Excel</button>
                <select id="filterMonth" onchange="renderTasks()">
                    <option value="">🗓️ Mês (Todos)</option>
                    <option value="01">Janeiro</option><option value="02">Fevereiro</option><option value="03">Março</option><option value="04">Abril</option><option value="05">Maio</option><option value="06">Junho</option><option value="07">Julho</option><option value="08">Agosto</option><option value="09">Setembro</option><option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
                <select id="filterDept" onchange="renderTasks()"><option value="">🏢 Setores</option></select>
                <select id="filterRequester" onchange="renderTasks()"><option value="">🔍 Solicitantes</option></select>
            </div>

            <div class="input-group">
                <input type="text" id="taskInput" placeholder="+ Adicionar nova tarefa rápida..." onkeypress="if(event.key==='Enter') addTask()" style="flex: 1;">
                <select id="requesterSelect"><option value="">👤 Para quem?</option><option value="Eu mesmo">Eu mesmo</option><option value="Aline">Aline</option><option value="Debora">Debora</option></select>
                <select id="deptSelect"><option value="">🏢 Setor...</option><option value="Administrativo">Administrativo</option><option value="Comercial">Comercial</option></select>
                <button onclick="addTask()">Salvar</button>
            </div>

            <div class="kanban-board">
                
                <div class="list-header">
                    <div>Tarefa (Clique para abrir)</div>
                    <div>Resp. / Setor</div>
                    <div>Prazo</div>
                    <div>Urgência</div>
                    <div>Status</div>
                    <div style="text-align: center;">Resumo</div>
                    <div></div>
                </div>

                <div class="status-section">
                    <div class="status-header header-a-fazer"><h2>⏳ A Fazer (<span id="count-a-fazer">0</span>)</h2></div>
                    <ul class="task-list" id="taskList-a-fazer"></ul>
                </div>
                
                <div class="status-section">
                    <div class="status-header header-em-andamento"><h2>🚀 Em Andamento (<span id="count-em-andamento">0</span>)</h2></div>
                    <ul class="task-list" id="taskList-em-andamento"></ul>
                </div>
                
                <div class="status-section">
                    <div class="status-header header-concluido"><h2>✅ Concluído (<span id="count-concluido">0</span>)</h2></div>
                    <ul class="task-list" id="taskList-concluido"></ul>
                </div>

            </div>
        </div>
    </div>

    <div id="taskModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTaskTitle">Detalhes da Tarefa</h2>
                <button class="btn-close-modal" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalTaskBody">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
